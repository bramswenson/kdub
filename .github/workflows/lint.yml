name: Lint
on: push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run ShellCheck
        run: |
          files=()
          for f in src/lib/*.sh; do [[ -f "$f" ]] && files+=("$f"); done
          for dir in gpg card yubikey setup tails; do
            if [[ -d "src/mise-tasks/${dir}" ]]; then
              for f in "src/mise-tasks/${dir}"/*; do [[ -f "$f" ]] && files+=("$f"); done
            fi
          done
          [[ -f src/install-mise.sh ]] && files+=("src/install-mise.sh")
          echo "Checking ${#files[@]} files..."
          shellcheck "${files[@]}"
