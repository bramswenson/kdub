name: Tails QEMU Test
on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
  push:
    paths:
      - 'test/ci/tails-*'
      - '.tails-version'
      - '.chutney-commit'
      - '.github/workflows/tails-test.yml'
      - 'src/**'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  tails:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install QEMU and xorriso
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 xorriso tor
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm
      - name: Cache Tails ISO
        uses: actions/cache@v4
        with:
          path: /tmp/tails.iso
          key: tails-iso-${{ hashFiles('.tails-version') }}
      - name: Cache Chutney
        uses: actions/cache@v4
        with:
          path: /tmp/chutney
          key: chutney-${{ hashFiles('.chutney-commit') }}
      - name: Run Tails smoke tests
        run: bash test/ci/tails-qemu-test.sh
        env:
          BOOT_TIMEOUT: 300
